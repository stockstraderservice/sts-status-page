<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>STS — Service Status</title>
  <meta name="description" content="Live infrastructure status for Stock Trader Service. Hosted off-Vercel so it stays up during platform outages.">
  <meta name="robots" content="index,follow">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Ctext y='14' font-size='14'%3E%E2%98%85%3C/text%3E%3C/svg%3E">
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0; padding: 32px 16px;
      background: #080b0f; color: #d4e2ed;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100dvh;
    }
    .wrap { max-width: 720px; margin: 0 auto; }
    h1 { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 4px; color: #00e676; margin: 0 0 4px; }
    .sub { font-family: 'DM Mono', monospace; font-size: 11px; color: #9eb0c2; letter-spacing: 2px; margin: 0 0 32px; text-transform: uppercase; }
    .banner {
      padding: 14px 16px; margin-bottom: 24px;
      font-family: 'DM Mono', monospace; font-size: 12px; line-height: 1.5;
      border-left: 3px solid;
    }
    .banner.ok    { background: #0a1f12; border-color: #00e676; color: #b6f0c8; }
    .banner.warn  { background: #1f1a0a; border-color: #ffd600; color: #f0e2b6; }
    .banner.fail  { background: #1f0a0a; border-color: #ef5350; color: #f0b6b6; }
    .stale {
      padding: 12px 14px; margin-bottom: 16px;
      background: #1f1a0a; border-left: 3px solid #ffd600;
      font-family: 'DM Mono', monospace; font-size: 11px; color: #f0e2b6; line-height: 1.6;
    }
    table { width: 100%; border-collapse: collapse; }
    th, td {
      text-align: left; padding: 12px 14px;
      font-family: 'DM Mono', monospace; font-size: 12px;
      border-bottom: 1px solid #1e2e3e;
    }
    th { color: #9eb0c2; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; font-size: 10px; }
    td.label { color: #f0f6fa; }
    td.dot { width: 16px; }
    td.right { text-align: right; color: #7a9ab0; }
    .dot::before {
      content: ''; display: inline-block;
      width: 8px; height: 8px; border-radius: 50%;
      vertical-align: middle;
    }
    .ok::before    { background: #00e676; box-shadow: 0 0 8px #00e676; }
    .warn::before  { background: #ffd600; box-shadow: 0 0 8px #ffd600; }
    .fail::before  { background: #ef5350; box-shadow: 0 0 8px #ef5350; }
    .skip::before  { background: #455a6e; }
    .footer {
      margin-top: 32px; padding-top: 24px; border-top: 1px solid #1e2e3e;
      font-family: 'DM Mono', monospace; font-size: 10px; color: #546e7a; line-height: 1.7;
    }
    .footer a { color: #4fc3f7; text-decoration: none; }
    code { background: #0d1318; padding: 2px 6px; border: 1px solid #1e2e3e; font-size: 11px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>★ STS · STATUS</h1>
    <div class="sub">Stock Trader Service — Infrastructure Health</div>

    <div id="staleBanner" style="display:none"></div>
    <div id="banner" class="banner warn">Loading…</div>

    <table>
      <thead><tr><th></th><th>Component</th><th class="right">Latency / Detail</th></tr></thead>
      <tbody id="rows"></tbody>
    </table>

    <div class="footer">
      Last snapshot: <span id="lastUpdated">—</span> ·
      Updated every ~5 min via GitHub Actions, hosted on GitHub Pages (independent of Vercel).
      <br>
      Probe source: <code>/api/health/deep</code> on the production deployment.
      Main site: <a href="https://www.stockstraderservice.com">stockstraderservice.com</a>
    </div>
  </div>

<script>
const COMPONENTS = [
  { key: 'gas',           label: 'Google Apps Script' },
  { key: 'google_auth',   label: 'Google OAuth' },
  { key: 'google_cloud',  label: 'Google Cloud APIs' },
  { key: 'anthropic',     label: 'Anthropic API' },
  { key: 'bedrock',       label: 'AWS Bedrock (failover)', optional: true },
  { key: 'gemini',        label: 'Google Gemini (failover)', optional: true },
  { key: 'deepseek',      label: 'DeepSeek (failover)', optional: true },
  { key: 'stripe',        label: 'Stripe' },
  { key: 'finnhub',       label: 'Finnhub (market data)' },
  { key: 'yahoo',         label: 'Yahoo Finance' },
  { key: 'stooq',         label: 'Stooq (historical prices)' },
  { key: 'google_news',   label: 'Google News RSS' },
  { key: 'google_nlp',    label: 'Google NLP' },
  // SendGrid removed 2026-05-20 — email channel migrated to GAS MailApp on 2026-05-18
  // (see project_sts_session_20260518). The sendgrid_* fields on /api/health/deep stay
  // for back-compat but are no longer surfaced on this page since the service is unused.
];

function fmtAge(iso) {
  if (!iso) return 'unknown';
  const ageMs = Date.now() - new Date(iso).getTime();
  if (!Number.isFinite(ageMs) || ageMs < 0) return 'unknown';
  const m = Math.floor(ageMs / 60000);
  if (m < 1) return 'just now';
  if (m < 60) return m + ' min ago';
  const h = Math.floor(m / 60);
  return h + 'h ' + (m % 60) + 'm ago';
}

function render(snapshot) {
  const meta = snapshot._meta || {};
  const data = snapshot.data || snapshot;

  // Stale banner: GitHub free-tier scheduled workflows are typically delayed 30-180 min
  // (despite the */5 * * * * schedule) — bumped threshold 15 min → 3 hours 2026-05-20 to
  // stop firing false-positive warnings on normal GH cron drift. If snapshot exceeds 3h,
  // the cron is genuinely stuck (or the main site is unreachable).
  const snapAge = meta.fetchedAt ? Date.now() - new Date(meta.fetchedAt).getTime() : Infinity;
  const stale = snapAge > 3 * 60 * 60 * 1000;
  const staleEl = document.getElementById('staleBanner');
  if (stale) {
    staleEl.className = 'stale';
    staleEl.style.display = 'block';
    staleEl.innerHTML = '⚠ This status page is showing data from ' + fmtAge(meta.fetchedAt) +
      '. The snapshot job (GitHub Actions) has not run in over 3 hours — likely the GH cron is stuck OR the main site is unreachable. ' +
      'If the main site is also unreachable, treat all components as suspect.';
  }

  // Master banner
  const bn = document.getElementById('banner');
  if (meta.fetchError) {
    bn.className = 'banner fail';
    bn.textContent = 'Snapshot job could not reach the production deployment: ' + meta.fetchError;
  } else if (data.ok === true) {
    bn.className = 'banner ok';
    bn.textContent = '✓ All core systems operational.';
  } else if (data.ok === false) {
    bn.className = 'banner fail';
    bn.textContent = '✗ One or more critical components are degraded — see below.';
  } else {
    bn.className = 'banner warn';
    bn.textContent = 'No status snapshot available yet.';
  }

  // Per-component rows
  const rowsEl = document.getElementById('rows');
  rowsEl.innerHTML = '';
  for (const c of COMPONENTS) {
    const ok          = data[c.key + '_ok'];
    const lat         = data[c.key + '_latency_ms'];
    const err         = data[c.key + '_error'];
    const configured  = data[c.key + '_configured'];

    let dotClass = 'skip';
    let detail   = '—';
    if (c.optional && configured === false) {
      dotClass = 'skip'; detail = 'not configured';
    } else if (ok === true) {
      dotClass = 'ok';   detail = (typeof lat === 'number' ? lat + 'ms' : 'ok');
    } else if (ok === false) {
      dotClass = 'fail'; detail = err || 'down';
    }

    const tr = document.createElement('tr');
    tr.innerHTML = '<td class="dot ' + dotClass + '"></td>' +
                   '<td class="label">' + c.label + '</td>' +
                   '<td class="right">' + detail + '</td>';
    rowsEl.appendChild(tr);
  }

  // Footer
  document.getElementById('lastUpdated').textContent =
    meta.fetchedAt ? (new Date(meta.fetchedAt).toLocaleString()) + ' · ' + fmtAge(meta.fetchedAt) : '—';
}

(async function () {
  try {
    const r = await fetch('data/status.json?t=' + Date.now(), { cache: 'no-store' });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const json = await r.json();
    render(json);
  } catch (e) {
    document.getElementById('banner').className = 'banner fail';
    document.getElementById('banner').textContent = 'Could not load status data: ' + (e && e.message || e);
  }
})();
</script>
</body>
</html>
