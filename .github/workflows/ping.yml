name: Snapshot status

on:
  schedule:
    # Every 5 minutes. GitHub may delay scheduled runs by 5-15 min under load,
    # so the page UI flags any snapshot older than 15 min as stale.
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

concurrency:
  group: status-snapshot
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4

      - name: Fetch /api/health/deep
        id: fetch
        run: |
          set +e
          mkdir -p data
          BODY=$(curl -sS --max-time 25 -w '\n__STATUS__:%{http_code}' https://www.stockstraderservice.com/api/health/deep)
          CODE=$(echo "$BODY" | tail -n1 | sed 's/^__STATUS__://')
          PAYLOAD=$(echo "$BODY" | sed '$d')
          NOW=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          if [ -z "$PAYLOAD" ] || ! echo "$PAYLOAD" | jq empty 2>/dev/null; then
            jq -n --arg now "$NOW" --arg code "$CODE" \
              '{_meta: {fetchedAt: $now, httpStatus: ($code|tonumber? // 0), fetchError: "no JSON body"}, data: null}' \
              > data/status.json
          else
            echo "$PAYLOAD" | jq --arg now "$NOW" --arg code "$CODE" \
              '{_meta: {fetchedAt: $now, httpStatus: ($code|tonumber? // 0)}, data: .}' \
              > data/status.json
          fi
          echo "Snapshot written ($CODE)"

      - name: Commit if changed
        run: |
          git config user.name  "sts-status-bot"
          git config user.email "sts-status-bot@users.noreply.github.com"
          git add data/status.json
          if git diff --cached --quiet; then
            echo "No change."
            exit 0
          fi
          git commit -m "snapshot $(date -u +%Y-%m-%dT%H:%MZ)"
          # Rebase + retry — fixes the "fetch first" rejection that hit when two
          # 5-min cron jobs landed within seconds of each other (e.g. delayed
          # run A finishing as run B starts). Without this, the loser's push is
          # discarded and its snapshot lost. Up to 3 attempts, each rebasing on
          # latest origin/main before re-pushing.
          #
          # -X theirs auto-resolves any data/status.json merge conflict by
          # keeping our (in-flight) snapshot. In rebase context "theirs" means
          # the side being rebased (us) — counterintuitive but correct: we want
          # OUR fresher fetch to win over the snapshot that already landed,
          # since only the latest snapshot matters to the status page UI.
          # Added 2026-06-05 after exit-1 failure when run A and B both wrote
          # data/status.json and the bare rebase choked on the conflict.
          for i in 1 2 3; do
            if git push; then
              echo "Pushed on attempt $i"
              exit 0
            fi
            echo "Push attempt $i rejected — rebasing on origin/main and retrying"
            git pull --rebase -X theirs origin main
          done
          echo "::error::push failed after 3 attempts"
          exit 1
